services:
  installer:
    image: ghcr.io/biohazard786/warpdrop-cli-installer:latest
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    networks:
      - web

  backend:
    image: ghcr.io/biohazard786/warpdrop-backend:latest
    environment:
      - PORT=8080
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - web

  frontend:
    image: ghcr.io/biohazard786/warpdrop-frontend:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_STUN_SERVER=${NEXT_PUBLIC_STUN_SERVER:-stun:stun.l.google.com:19302}
      - NEXT_PUBLIC_DOMAIN=${DOMAIN}
      # - NEXT_PUBLIC_TURN_SERVER=${NEXT_PUBLIC_TURN_SERVER:-turn.${DOMAIN}}
      # - NEXT_PUBLIC_TURN_USERNAME=${NEXT_PUBLIC_TURN_USERNAME:-warpdrop}
      # - NEXT_PUBLIC_TURN_PASSWORD=${NEXT_PUBLIC_TURN_PASSWORD:-warpdrop-secret}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - web

  # coturn:
  #   image: coturn/coturn:latest
  #   ports:
  #     - "3478:3478/tcp"
  #     - "3478:3478/udp"
  #     - "5349:5349/tcp"
  #     - "5349:5349/udp"
  #     - "60000-60128:60000-60128/udp"
  #   volumes:
  #     - ./deploy/turnserver.conf:/etc/coturn/turnserver.conf
  #   restart: unless-stopped
  #   networks:
  #     - web
  #   environment:
  #     - DETECT_EXTERNAL_IP=yes
  #     - DETECT_RELAY_IP=yes
  #   # NOTE: TURN over TLS (port 5349) needs certificates at /etc/coturn/certs.
  #   # Easiest path: point your host Caddy/Nginx at turn.${DOMAIN} so it provisions
  #   # a cert, then mount the cert files into this container via an extra volume.

networks:
  web:
    external: false
